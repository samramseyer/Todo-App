name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify production build
        run: |
          if grep -q '/src/' build/index.html; then
            echo "Build failed: build still references source files"
            exit 1
          fi
          test -f build/index.html

      - name: Publish build to repository root
        run: |
          cp build/index.html index.html
          cp build/index.html 404.html
          rsync -a --delete build/static/ static/
          cp build/asset-manifest.json asset-manifest.json
          cp build/manifest.json manifest.json 2>/dev/null || true
          cp build/favicon.ico favicon.ico 2>/dev/null || true
          echo '' > .nojekyll

      - name: Commit and push production files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html static/ asset-manifest.json manifest.json favicon.ico .nojekyll
          git diff --staged --quiet && echo "No production changes to deploy" && exit 0
          git commit -m "deploy: update GitHub Pages production build [skip ci]"
          git push
